services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costpulse}
      POSTGRES_DB: ${POSTGRES_DB:-costpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costpulse}
      POSTGRES_DB: ${POSTGRES_DB:-costpulse}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:-dev-connector-key}
      SQL_AGENT_A2A_URL: ${SQL_AGENT_A2A_URL:-http://sql-agent:8010}
      DASHBOARD_AGENT_A2A_URL: ${DASHBOARD_AGENT_A2A_URL:-http://dashboard-agent:8011}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-gpt-oss-120b}
    depends_on:
      - postgres
      - redis
      - sql-agent
      - dashboard-agent
    ports:
      - "8000:8000"
    volumes:
      - ./backend/.env:/app/.env:ro

  sql-agent:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["uvicorn", "app.a2a_apps.sql_agent:app", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:-dev-connector-key}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      - postgres
    ports:
      - "8010:8010"
    volumes:
      - ./backend/.env:/app/.env:ro

  dashboard-agent:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["uvicorn", "app.a2a_apps.dashboard_agent:app", "--host", "0.0.0.0", "--port", "8011"]
    environment:
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:-dev-connector-key}
    ports:
      - "8011:8011"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
