services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costpulse}
      POSTGRES_DB: ${POSTGRES_DB:-costpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costpulse}
      POSTGRES_DB: ${POSTGRES_DB:-costpulse}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
